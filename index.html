<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ffd6e8,#ffeef6,#fff5d6,#ffe0f0);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    position:relative;
}

/* Animated Background */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-30px;
    pointer-events:none;
    animation:float linear forwards;
    opacity:.8;
    z-index:1;
}

@keyframes float{

0%{
transform:translateY(0) scale(.6);
opacity:1;
}

100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}

}

.card{

width:420px;
max-width:92%;
padding:30px;
border-radius:28px;

background:rgba(255,255,255,.85);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

box-shadow:
0 20px 50px rgba(0,0,0,.15),
0 0 40px rgba(255,255,255,.2);

text-align:center;

position:relative;

z-index:10;

animation:cardPop .7s ease;

}

@keyframes cardPop{

from{

opacity:0;
transform:translateY(40px) scale(.9);

}

to{

opacity:1;
transform:translateY(0) scale(1);

}

}

.page{

display:none;

animation:fade .5s;

}

.page.active{

display:block;

}

@keyframes fade{

from{
opacity:0;
transform:translateX(20px);
}

to{
opacity:1;
transform:translateX(0);
}

}

img{

width:180px;
height:180px;

object-fit:cover;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

margin-bottom:20px;

animation:bounce 2s infinite;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

h1{

color:#ff4f8b;

font-size:32px;

margin-bottom:15px;

}

h2{

color:#ff5f95;

margin-top:15px;

}

p{

color:#555;

line-height:1.6;

margin-bottom:15px;

font-size:17px;

}

#message{

min-height:50px;

font-weight:600;

color:#ff4f8b;

}

button{

padding:14px 28px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:17px;

font-weight:700;

transition:.3s;

margin:8px;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(255,79,139,.25);

}

button:active{

transform:scale(.96);

}

.yes{

background:#ff4f8b;

color:white;

animation:pulse 1.8s infinite;

}

@keyframes pulse{

0%{

box-shadow:0 0 0 0 rgba(255,79,139,.45);

}

70%{

box-shadow:0 0 0 15px rgba(255,79,139,0);

}

100%{

box-shadow:0 0 0 0 rgba(255,79,139,0);

}

}

.no{

background:#efefef;

color:#444;

}

.next{

background:#ff7daa;

color:white;

}

.option{

display:block;

width:100%;

background:#ffe5ef;

color:#444;

margin:12px 0;

}

.option:hover{

background:#ffd2e4;

}

input,
select{

width:100%;

padding:14px;

margin:10px 0;

border:none;

border-radius:16px;

background:#fff0f6;

outline:none;

font-size:16px;

transition:.3s;

}

input:focus,
select:focus{

background:white;

box-shadow:0 0 0 3px rgba(255,79,139,.2);

}

.progress{

height:10px;

background:#f0f0f0;

border-radius:30px;

overflow:hidden;

margin-bottom:25px;

}

.bar{

height:100%;

width:0;

background:linear-gradient(to right,#ff4f8b,#ff8db5);

transition:.4s;

border-radius:30px;

}

#summary{

margin-top:20px;

padding:20px;

border-radius:20px;

background:#fff4f8;

line-height:2;

font-size:18px;

color:#444;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

#proposal{

font-size:28px;

font-weight:bold;

color:#ff4f8b;

margin:20px 0;

}

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#ff9dc0;

border-radius:20px;

}

::-webkit-scrollbar-track{

background:#ffeaf3;

}

/* Mobile */

@media(max-width:500px){

.card{

padding:22px;

width:95%;

}

img{

width:150px;
height:150px;

}

h1{

font-size:27px;

}

h2{

font-size:22px;

}

p{

font-size:15px;

}

button{

width:100%;

margin:8px 0;

font-size:16px;

}

input,
select{

font-size:15px;

}

#proposal{

font-size:24px;

}

}
</style>
</head>

<body>

<div class="card">

<!-- Welcome -->

<div class="page active" id="page1">

<img id="cat1" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

<h1>Hi Beautiful ❤️</h1>

<p>I made something special just for you...</p>

<p>Ready? 🥹</p>

<button class="next" onclick="showPage(2)">Start ✨</button>

</div>

<!-- Proposal -->

<div class="page" id="page2">

<img id="proposalCat" src="https://media1.tenor.com/m/z2l6BBCFgTYAAAAd/cute-cats-memes.gif">

<h1 id="title">
Will You Go On A Date With Me? ❤️
</h1>

<p id="message">
Please say yes 🥺
</p>

<button class="yes" id="yesBtn">
YES 💖
</button>

<button class="no" id="noBtn">
NO 🙈
</button>

</div>

<!-- Date -->

<div class="page" id="page3">

<img src="https://media1.tenor.com/m/b2iK29wNiCEAAAAd/cat-cat-with-wiered-and-cute-reactions.gif">

<h1>YAYYYYY!! ❤️</h1>

<p>You just made me the happiest person 🥹</p>

<p>Now let's choose our date!</p>

<input type="date" id="date">

<input type="time" id="time">

<select id="activity">

<option>Cabin date ☕</option>

<option>Movie date 🎬</option>

<option>Lunch 🍕 </option>

<option>Ghumi-Ghmumi on Vroom Vroom 🌸</option>

<!-- <option>Ice Cream 🍦</option> -->

</select>

<button class="next" id="confirm">
Confirm Our Date 💕
</button>

</div>

<!-- Celebration -->

<div class="page" id="page4">

<img src="https://media1.tenor.com/m/MKkJWYigjycAAAAC/cute-cat-cat-cute.gif">

<h1>It's Official!! 🎉</h1>

<div id="summary"></div>

<h2 style="margin-top:20px;color:#ff4d88;">
I Can't Wait To See You ❤️
</h2>

</div>

</div>

<script>

function showPage(n){

document.querySelectorAll(".page").forEach(page=>{
page.classList.remove("active");
});

document.getElementById("page"+n).classList.add("active");

}

const yes=document.getElementById("yesBtn");
const no=document.getElementById("noBtn");
const msg=document.getElementById("message");
const title=document.getElementById("title");

let clicks=0;

const messages=[

"Are you sure? 🥺",

"Really sure? 😿",

"Think again ❤️",

"I'll bring snacks 🍫",

"I'll bring flowers 🌹",

"Pretty please? 🥹",

"You know you want to 😏",

"The YES button looks nicer 💖"

];

no.onclick=()=>{

clicks++;

msg.innerHTML=messages[Math.min(clicks-1,messages.length-1)];

let noScale=Math.max(.15,1-clicks*.15);
let yesScale=1+clicks*.15;

no.style.transform=`scale(${noScale})`;
yes.style.transform=`scale(${yesScale})`;

if(clicks>=6){

no.style.display="none";

title.innerHTML="Only one option left... 😁❤️";

}

};

yes.onclick = async () => {

    // Notify your Vercel API
    await fetch("/api/yes", {
        method: "POST"
    });

    for (let i = 0; i < 80; i++) createHeart();

    showPage(3);

};

document.getElementById("confirm").onclick = async () => {

    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const activity = document.getElementById("activity").value;

    // Send data to backend
    try {
                await fetch("/api/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                date,
                time,
                activity
            })
        });
    } catch (err) {
        console.error(err);
    }

    document.getElementById("summary").innerHTML = `
        <h2 style="color:#ff4d88;">Our Date ❤️</h2>
        <p>📅 ${date || "You forgot the date 😆"}</p>
        <p>🕒 ${time || "Any Time"}</p>
        <p>${activity}</p>
    `;

    for(let i=0;i<150;i++) createHeart();

    showPage(4);
};

function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>.5?"💖":"💕";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*18)+"px";

h.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},5000);

}

setInterval(createHeart,900);

</script>

</body>
</html>
